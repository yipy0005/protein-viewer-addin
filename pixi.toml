[workspace]
authors = ["yipy0005 <yipy0005@gmail.com>"]
channels = ["conda-forge"]
name = "protein-viewer-addin"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
serve = "python server/server_main.py"
build = "npx webpack --mode production"
sideload = """
mkdir -p ~/Library/Containers/com.microsoft.Powerpoint/Data/Documents/wef && \
cp manifest.xml ~/Library/Containers/com.microsoft.Powerpoint/Data/Documents/wef/ProteinViewer.xml && \
cp manifest-content.xml ~/Library/Containers/com.microsoft.Powerpoint/Data/Documents/wef/ProteinViewerContent.xml && \
echo 'Manifests sideloaded. Restart PowerPoint.'
"""

[dependencies]
python = ">=3.14.3,<3.15"
fastapi = ">=0.135.2,<0.136"
uvicorn = ">=0.42.0,<0.43"
starlette = ">=1.0.0,<2"
pdbfixer = ">=1.12,<2"
